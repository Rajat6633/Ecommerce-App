# ============================================================================
#  Prometheus scrape configuration
#  - Scrapes each Spring Boot service at /actuator/prometheus (Micrometer)
#  - Scrapes the OTel Collector (span metrics + collector internals)
#  - Service targets resolve via the docker compose network DNS names.
#    Jobs for not-yet-built services stay "down" until those services run.
# ============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ecommerce-local
    env: local

rule_files:
  - /etc/prometheus/rules/*.yml   # alerting rules added in a later phase

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # --- OpenTelemetry Collector (RED/span metrics exported on :8889) ---
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # --- Spring Boot microservices (Micrometer -> /actuator/prometheus) ---
  - job_name: spring-services
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["auth-service:8081"]
        labels: { service: auth-service }
      - targets: ["product-service:8082"]
        labels: { service: product-service }
      - targets: ["inventory-service:8083"]
        labels: { service: inventory-service }
      - targets: ["cart-service:8084"]
        labels: { service: cart-service }
      - targets: ["order-service:8085"]
        labels: { service: order-service }
      - targets: ["payment-service:8086"]
        labels: { service: payment-service }
      - targets: ["notification-service:8087"]
        labels: { service: notification-service }
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
