# ============================================================================
#  Tempo — distributed tracing backend (single-binary, local filesystem).
#  Receives spans from the OTel Collector via OTLP and exposes a query API
#  consumed by Grafana. Also generates service-graph + span metrics that are
#  remote-written to Prometheus for RED dashboards.
# ============================================================================
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h        # keep traces 7 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Generate RED metrics + service graph from spans and push to Prometheus.
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: ecommerce-local
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
