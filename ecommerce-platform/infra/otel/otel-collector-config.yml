# ============================================================================
#  OpenTelemetry Collector (contrib) configuration
#  Pipeline: services --OTLP--> collector --> Tempo (traces)
#                                        \--> Prometheus (span/RED metrics)
#  Acts as the single egress point so services only know the collector
#  endpoint (OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317).
# ============================================================================
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 2s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 20
  # Tag every span with the deployment environment.
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

connectors:
  # Derive RED metrics (rate/errors/duration) from spans -> exported to Prometheus.
  spanmetrics:
    namespace: traces.spanmetrics
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - name: service.name
      - name: http.method
      - name: http.route
      - name: http.status_code

exporters:
  # Traces -> Tempo (OTLP gRPC). Internal port; not exposed to host.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Span/RED metrics -> scraped by Prometheus at otel-collector:8889
  prometheus:
    endpoint: 0.0.0.0:8889
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo, spanmetrics]
    metrics:
      receivers: [spanmetrics]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
  telemetry:
    logs:
      level: info
