# ============================================================================
#  auth-service — base configuration (profile-independent).
#  Datasource is supplied per-profile (local/docker/k8s) or via env in K8s.
# ============================================================================
spring:
  application:
    name: auth-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
  flyway:
    enabled: true
    validate-on-migrate: true
  # Producer only — auth publishes user.registered and consumes nothing.
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Tracing (C5): producer observation injects the trace context into the
    # user.registered Kafka headers, so the downstream saga (kyc→order→...)
    # correlates back to the originating register request as ONE distributed
    # trace. The auto-configured KafkaTemplate picks this up.
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

# ---- Auth / JWT ----
auth:
  refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL:604800}   # 7 days
  jwt:
    issuer: auth-service
    # Audience (aud) claim minted on the access token; resource servers validate it.
    audience: ${JWT_AUDIENCE:ecommerce-services}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL:900}      # 15 minutes
    # Key locations unset -> ephemeral keypair (local/test). Set in docker/k8s.

# ---- Resilience4j — wraps the Kafka publisher (uniform "kafka-publisher"
#      instance shared with order/payment/inventory). A publish failure must
#      never break registration: the adapter's fallback logs and swallows. ----
resilience4j:
  circuitbreaker:
    instances:
      kafka-publisher:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        # Local back-pressure (rate-limiter / bulkhead rejection) is not a
        # broker fault, so it must not count toward opening the circuit.
        ignore-exceptions:
          - io.github.resilience4j.ratelimiter.RequestNotPermitted
          - io.github.resilience4j.bulkhead.BulkheadFullException
  retry:
    instances:
      kafka-publisher:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  ratelimiter:
    instances:
      kafka-publisher:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 0
  bulkhead:
    instances:
      kafka-publisher:
        max-concurrent-calls: 20
        max-wait-duration: 0

# ---- Observability ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
  metrics:
    tags:
      service: auth-service
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
