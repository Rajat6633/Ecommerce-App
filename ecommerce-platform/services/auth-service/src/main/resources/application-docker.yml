# Docker profile — service runs inside docker-compose network.
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/auth_db
    username: ${POSTGRES_USER:ecommerce}
    password: ${POSTGRES_PASSWORD:ecommerce}
  kafka:
    bootstrap-servers: kafka:29092
# Shared RS256 keypair mounted by docker-compose.apps.yml. Without this the
# service falls back to an ephemeral keypair and tokens fail validation in
# every other service (they verify against the shared public key).
auth:
  jwt:
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:file:/keys/private.pem}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:file:/keys/public.pem}
management:
  otlp:
    tracing:
      endpoint: http://otel-collector:4318/v1/traces
