# Test profile defaults — in-memory cache, no Redis, no trace export.
# Datasource is provided per-test via Testcontainers @DynamicPropertySource.
spring:
  cache:
    type: simple
auth:
  jwt:
    public-key-location: classpath:keys/public.pem
management:
  health:
    redis:
      enabled: false
  tracing:
    sampling:
      probability: 0.0
