# Local profile: localhost infra. Chat = local Ollama (llama3.2:3b) on
# http://localhost:11434 — no ANTHROPIC_API_KEY required. Embeddings stay the
# deterministic stub (AiConfig) + SimpleVectorStore, so screening needs no
# Postgres/pgvector locally.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kyc_db
    username: ecommerce
    password: ecommerce
  kafka:
    bootstrap-servers: localhost:9092
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true        # Ollama is the single active ChatModel under 'local'
        options:
          model: ${KYC_CHAT_MODEL:llama3.2:3b}
    anthropic:
      chat:
        enabled: false       # keep Anthropic off so only ONE ChatModel exists
