# Cloud profile (optional): chat/vision = Anthropic Claude (needs ANTHROPIC_API_KEY).
# Embeddings = real Transformers (ONNX) + pgvector store. This is the original
# Anthropic path, retained behind its own profile so the default local/docker/k8s
# runs use local Ollama instead. Infra endpoints come from the environment.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/kyc_db}
    username: ${POSTGRES_USER:ecommerce}
    password: ${POSTGRES_PASSWORD:ecommerce}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        enabled: true        # Anthropic is the single active ChatModel under 'cloud'
        options:
          model: ${KYC_ANTHROPIC_CHAT_MODEL:claude-opus-4-8}
    ollama:
      chat:
        enabled: false       # keep Ollama off so only ONE ChatModel exists
management:
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
