# ============================================================================
#  Kubernetes Secrets — DEV placeholders for Minikube.
#  ---------------------------------------------------------------------------
#  PRODUCTION: do NOT commit real secrets. Use Sealed Secrets / External
#  Secrets Operator / cloud secret managers. `stringData` is plaintext-in,
#  base64-at-rest; shown here for local clarity only.
#
#  Generate a real RS256 keypair for JWT and replace the placeholders:
#    openssl genrsa -out jwt-private.pem 2048
#    openssl rsa -in jwt-private.pem -pubout -out jwt-public.pem
#    kubectl -n ecommerce create secret generic jwt-keys \
#      --from-file=private.pem=jwt-private.pem \
#      --from-file=public.pem=jwt-public.pem
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: ecommerce
type: Opaque
stringData:
  POSTGRES_USER: ecommerce
  POSTGRES_PASSWORD: "change-me-in-prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-keys
  namespace: ecommerce
type: Opaque
stringData:
  # Replace with real PEM contents (see header). Auth-service signs with the
  # private key; gateway + services verify with the public key.
  private.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_REAL_RS256_PRIVATE_KEY
    -----END PRIVATE KEY-----
  public.pem: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_REAL_RS256_PUBLIC_KEY
    -----END PUBLIC KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  namespace: ecommerce
type: Opaque
stringData:
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "notifications@example.com"
  SMTP_PASSWORD: "change-me-in-prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: ecommerce
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: "change-me-in-prod"
