# ============================================================================
#  Promtail — DaemonSet that tails pod logs on every node and ships to Loki.
#  Uses Kubernetes service discovery + RBAC to read pod metadata; parses the
#  JSON app logs to promote level/service and trace IDs.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata: { name: promtail, namespace: ecommerce }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: promtail-clusterrole }
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: promtail-clusterrolebinding }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-clusterrole
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: ecommerce
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: ecommerce
data:
  promtail-config.yml: |
    server: { http_listen_port: 9080, grpc_listen_port: 0 }
    positions: { filename: /run/promtail/positions.yaml }
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs: [{ role: pod }]
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                app: service_name
                traceId: traceId
                spanId: spanId
                correlationId: correlationId
          - labels: { level: }
          - structured_metadata:
              traceId:
              spanId:
              correlationId:
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata: { name: promtail, namespace: ecommerce }
spec:
  selector: { matchLabels: { app: promtail } }
  template:
    metadata: { labels: { app: promtail } }
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args: ["-config.file=/etc/promtail/promtail-config.yml"]
          env:
            - name: HOSTNAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          volumeMounts:
            - { name: config,   mountPath: /etc/promtail }
            - { name: run,      mountPath: /run/promtail }
            - { name: pods,     mountPath: /var/log/pods,           readOnly: true }
            - { name: containers, mountPath: /var/lib/docker/containers, readOnly: true }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
      volumes:
        - name: config
          configMap: { name: promtail-config }
        - name: run
          hostPath: { path: /run/promtail }
        - name: pods
          hostPath: { path: /var/log/pods }
        - name: containers
          hostPath: { path: /var/lib/docker/containers }
