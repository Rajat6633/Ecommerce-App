# ============================================================================
#  Loki — single-binary log store (filesystem). Query API at loki:3100.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: ecommerce
data:
  loki-config.yml: |
    auth_enabled: false
    server: { http_listen_port: 3100, grpc_listen_port: 9096, log_level: info }
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem: { chunks_directory: /loki/chunks, rules_directory: /loki/rules }
      replication_factor: 1
      ring: { kvstore: { store: inmemory } }
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index: { prefix: index_, period: 24h }
    limits_config:
      retention_period: 168h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      allow_structured_metadata: true
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: loki-data, namespace: ecommerce }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 2Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: loki, namespace: ecommerce }
spec:
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata: { labels: { app: loki } }
    spec:
      securityContext: { fsGroup: 10001, runAsUser: 10001, runAsNonRoot: true }
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args: ["-config.file=/etc/loki/loki-config.yml"]
          ports: [{ containerPort: 3100 }]
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data,   mountPath: /loki }
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          persistentVolumeClaim: { claimName: loki-data }
---
apiVersion: v1
kind: Service
metadata: { name: loki, namespace: ecommerce, labels: { app: loki } }
spec:
  selector: { app: loki }
  ports: [{ name: http, port: 3100, targetPort: 3100 }]
