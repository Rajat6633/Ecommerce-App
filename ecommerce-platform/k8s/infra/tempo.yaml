# ============================================================================
#  Tempo — trace backend + span-metrics generator (remote-writes to Prometheus)
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: ecommerce
data:
  tempo.yml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
    distributor:
      receivers:
        otlp:
          protocols:
            grpc: { endpoint: 0.0.0.0:4317 }
            http: { endpoint: 0.0.0.0:4318 }
    ingester: { max_block_duration: 5m }
    compactor:
      compaction: { block_retention: 168h }
    storage:
      trace:
        backend: local
        wal: { path: /var/tempo/wal }
        local: { path: /var/tempo/blocks }
    metrics_generator:
      registry:
        external_labels: { source: tempo, cluster: minikube }
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - { url: http://prometheus:9090/api/v1/write, send_exemplars: true }
      traces_storage: { path: /var/tempo/generator/traces }
    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: tempo-data, namespace: ecommerce }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 2Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: tempo, namespace: ecommerce }
spec:
  replicas: 1
  selector: { matchLabels: { app: tempo } }
  template:
    metadata: { labels: { app: tempo } }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.5.0
          args: ["-config.file=/etc/tempo/tempo.yml"]
          ports:
            - { containerPort: 3200, name: http }
            - { containerPort: 4317, name: otlp-grpc }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo }
            - { name: data,   mountPath: /var/tempo }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: config
          configMap: { name: tempo-config }
        - name: data
          persistentVolumeClaim: { claimName: tempo-data }
---
apiVersion: v1
kind: Service
metadata: { name: tempo, namespace: ecommerce, labels: { app: tempo } }
spec:
  selector: { app: tempo }
  ports:
    - { name: http,      port: 3200, targetPort: 3200 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
