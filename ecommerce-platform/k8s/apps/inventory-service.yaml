# ============================================================================
#  inventory-service — Deployment + Service + ConfigMap. Owns inventory_db.
#  Kafka consumer (order.created) + producer (inventory.* events).
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata: { name: inventory-service-config, namespace: ecommerce }
data:
  SERVER_PORT: "8083"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/inventory_db"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "inventory-service"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecommerce
  labels: { app: inventory-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: inventory-service } }
  template:
    metadata:
      labels: { app: inventory-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8083"
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: inventory-service
          image: ecommerce/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8083 }]
          envFrom:
            - configMapRef: { name: app-common-config }
            - configMapRef: { name: inventory-service-config }
          env:
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } } }
          volumeMounts:
            - { name: jwt-keys, mountPath: /etc/jwt, readOnly: true }
          startupProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8083 }
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
      volumes:
        - name: jwt-keys
          secret: { secretName: jwt-keys }
---
apiVersion: v1
kind: Service
metadata: { name: inventory-service, namespace: ecommerce, labels: { app: inventory-service } }
spec:
  selector: { app: inventory-service }
  ports: [{ name: http, port: 8083, targetPort: 8083 }]
