# ============================================================================
#  payment-service — Deployment + Service + ConfigMap. Owns payment_db.
#  Consumes inventory.reserved; publishes payment.completed / payment.failed.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata: { name: payment-service-config, namespace: ecommerce }
data:
  SERVER_PORT: "8086"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/payment_db"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "payment-service"
  PAYMENT_SIMULATED_SUCCESS_RATE: "0.9"   # 90% success for demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce
  labels: { app: payment-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: payment-service } }
  template:
    metadata:
      labels: { app: payment-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8086"
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: payment-service
          image: ecommerce/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8086 }]
          envFrom:
            - configMapRef: { name: app-common-config }
            - configMapRef: { name: payment-service-config }
          env:
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } } }
          volumeMounts:
            - { name: jwt-keys, mountPath: /etc/jwt, readOnly: true }
          startupProbe:
            httpGet: { path: /actuator/health/readiness, port: 8086 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8086 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8086 }
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
      volumes:
        - name: jwt-keys
          secret: { secretName: jwt-keys }
---
apiVersion: v1
kind: Service
metadata: { name: payment-service, namespace: ecommerce, labels: { app: payment-service } }
spec:
  selector: { app: payment-service }
  ports: [{ name: http, port: 8086, targetPort: 8086 }]
