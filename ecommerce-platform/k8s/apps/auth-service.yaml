# ============================================================================
#  auth-service — Deployment + Service + ConfigMap
#  Owns auth_db. Signs JWTs with the RS256 private key (jwt-keys secret).
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata: { name: auth-service-config, namespace: ecommerce }
data:
  SERVER_PORT: "8081"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/auth_db"
  JWT_PRIVATE_KEY_LOCATION: "file:/etc/jwt/private.pem"
  JWT_ACCESS_TOKEN_TTL: "900"        # 15m
  JWT_REFRESH_TOKEN_TTL: "604800"    # 7d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce
  labels: { app: auth-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata:
      labels: { app: auth-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: auth-service
          image: ecommerce/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: app-common-config }
            - configMapRef: { name: auth-service-config }
          env:
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } } }
          volumeMounts:
            - { name: jwt-keys, mountPath: /etc/jwt, readOnly: true }
          startupProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            periodSeconds: 15
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits:   { cpu: "1",    memory: "768Mi" }
      volumes:
        - name: jwt-keys
          secret: { secretName: jwt-keys }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: ecommerce, labels: { app: auth-service } }
spec:
  selector: { app: auth-service }
  ports: [{ name: http, port: 8081, targetPort: 8081 }]
