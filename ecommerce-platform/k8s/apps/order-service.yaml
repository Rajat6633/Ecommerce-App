# ============================================================================
#  order-service — Deployment + Service + ConfigMap. Owns order_db.
#  Saga initiator: publishes order.created, consumes payment.*/inventory.* .
#  Calls cart-service + product-service via OpenFeign.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata: { name: order-service-config, namespace: ecommerce }
data:
  SERVER_PORT: "8085"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/order_db"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "order-service"
  CART_SERVICE_URL: "http://cart-service:8084"
  PRODUCT_SERVICE_URL: "http://product-service:8082"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce
  labels: { app: order-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: order-service } }
  template:
    metadata:
      labels: { app: order-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8085"
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: order-service
          image: ecommerce/order-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8085 }]
          envFrom:
            - configMapRef: { name: app-common-config }
            - configMapRef: { name: order-service-config }
          env:
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_USER } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: postgres-credentials, key: POSTGRES_PASSWORD } } }
          volumeMounts:
            - { name: jwt-keys, mountPath: /etc/jwt, readOnly: true }
          startupProbe:
            httpGet: { path: /actuator/health/readiness, port: 8085 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8085 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8085 }
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes:
        - name: jwt-keys
          secret: { secretName: jwt-keys }
---
apiVersion: v1
kind: Service
metadata: { name: order-service, namespace: ecommerce, labels: { app: order-service } }
spec:
  selector: { app: order-service }
  ports: [{ name: http, port: 8085, targetPort: 8085 }]
